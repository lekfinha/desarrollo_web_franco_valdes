{% extends 'base.html' %}

{% block title %} Estadísticas {% endblock %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/estadisticas.css') }}">
{% endblock %}

{% block content %}
<div class="container">
    <h1>Estadísticas de Actividades</h1>
    
    <div class="graficos-container">
        <div class="grafico">
            <h2>Actividades por Día</h2>
            <div id="grafico-lineas" style="width:100%; height:400px;"></div>
        </div>

        <div class="grafico">
            <h2>Actividades por Tema</h2>
            <div id="grafico-torta" style="width:100%; height:400px;"></div>
        </div>

        <div class="grafico">
            <h2>Actividades por Mes y Horario</h2>
            <div id="grafico-barras" style="width:100%; height:400px;"></div>
        </div>
    </div>

    <div class="volver-container">
        <a href="{{ url_for('index') }}" class="btn btn-primary">Volver a Portada</a>
    </div>
</div>

{% block javascript %}
<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="{{ url_for('static', filename='js/estadisticas.js') }}"></script>
{% endblock %}
{% endblock %}
