<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/fragments :: head('Listado de Actividades')}">
</head>
<body>
    <div class="main">
        <div th:replace="~{fragments/fragments :: header}"></div>
        <div class="centered">
            <h1>Listado de Actividades</h1>
            <table>
                <thead>
                    <tr>
                        <th>Inicio</th>
                        <th>Comuna</th>
                        <th>Nombre</th>
                        <th>Foto</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="actividad : ${actividades}" th:onclick="|window.location='@{/detalle/{id}(id=${actividad.id})}'|">
                        <td th:text="${#temporals.format(actividad.diaHoraInicio, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${actividad.comuna.nombre}"></td>
                        <td th:text="${actividad.nombre}"></td>
                        <td>
                            <div th:if="${actividad.fotos != null and !actividad.fotos.empty}">
                                <img th:src="@{/{ruta}(ruta=${actividad.fotos[0].rutaArchivo})}" 
                                     th:alt="${actividad.fotos[0].descripcion}" 
                                     style="width: 100px; height: 100px; object-fit: cover; border-radius: 8px;">
                            </div>
                            <div th:if="${actividad.fotos == null or actividad.fotos.empty}">
                                <span>Sin foto</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <!-- Paginación -->
            <div class="pagination" th:if="${totalPaginas > 1}">
                <div class="pagination-info">
                    <span th:text="'Mostrando ' + ${#lists.size(actividades)} + ' de ' + ${totalActividades} + ' actividades'"></span>
                </div>
                <div class="pagination-controls">
                    <!-- Botón Anterior -->
                    <a th:if="${paginaActual > 0}" 
                       th:href="@{/actividades(pagina=${paginaActual - 1})}" 
                       class="pagination-btn">&laquo; Anterior</a>
                    
                    <!-- Números de página -->
                    <span th:each="i : ${#numbers.sequence(0, totalPaginas - 1)}">
                        <a th:if="${i != paginaActual}" 
                           th:href="@{/actividades(pagina=${i})}" 
                           th:text="${i + 1}" 
                           class="pagination-btn"></a>
                        <span th:if="${i == paginaActual}" 
                              th:text="${i + 1}" 
                              class="pagination-btn active"></span>
                    </span>
                    
                    <!-- Botón Siguiente -->
                    <a th:if="${paginaActual < totalPaginas - 1}" 
                       th:href="@{/actividades(pagina=${paginaActual + 1})}" 
                       class="pagination-btn">Siguiente &raquo;</a>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/fragments :: footer}"></div>
</body>
</html>
