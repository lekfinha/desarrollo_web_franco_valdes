<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Evaluaciones - SocialAct</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/tablas.css}">
    <link rel="stylesheet" th:href="@{/css/fotos.css}">
    <link rel="stylesheet" th:href="@{/css/form.css}">
    <link rel="stylesheet" th:href="@{/css/comentarios.css}">
    <link rel="stylesheet" th:href="@{/css/evaluaciones.css}">
</head>
<body>
    <div class="main">
        <div th:replace="~{fragments/fragments :: header}"></div>
        
        <div class="container">
            <h1>Evaluaciones de Actividades</h1>
            
            <div class="evaluaciones-container">
                <table class="evaluaciones-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Fecha Inicio</th>
                            <th>Sector</th>
                            <th>Nombre</th>
                            <th>Tema</th>
                            <th>Nota</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="actividad : ${actividades}">
                            <td th:text="${actividad.id}">1</td>
                            <td th:text="${actividad.fechaInicio}">2025-06-02</td>
                            <td th:text="${actividad.sector}">Beauchef 859, terraza</td>
                            <td th:text="${actividad.nombre}">Escuela de malabarismo</td>
                            <td th:text="${actividad.tema}">deporte</td>
                            <td class="nota-cell" th:data-actividad-id="${actividad.id}" th:text="${actividad.nota}">6</td>
                            <td>
                                <button class="btn-evaluar" th:data-actividad-id="${actividad.id}" th:data-actividad-nombre="${actividad.nombre}">
                                    Evaluar
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal para evaluar -->
    <div id="modal-evaluacion" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Evaluar Actividad</h2>
            <p id="actividad-nombre"></p>
            <form id="form-evaluacion">
                <div class="form-group">
                    <label for="nota">Selecciona una nota (1-7):</label>
                    <select id="nota" name="nota" required>
                        <option value="">Selecciona una nota</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar Evaluación</button>
                    <button type="button" class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/evaluaciones.js}"></script>
</body>
</html>
