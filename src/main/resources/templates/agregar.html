<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/fragments :: head('Agregar Actividad')">
    <link rel="stylesheet" th:href="@{/css/form.css}">
</head>
<body>
    <div th:replace="fragments/fragments :: header"></div>
    <div class="main">
        <h1>Agregar Actividad</h1>
        <form th:action="@{/agregar}" th:object="${actividadForm}" method="post" enctype="multipart/form-data">
            <div>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" th:field="*{nombre}" required>
                </div>
            <div>
                    <label for="comuna">Comuna:</label>
                <select id="comuna" th:field="*{comuna}" required>
                    <option th:each="comuna : ${comunas}" th:value="${comuna.id}" th:text="${comuna.nombre}"></option>
                    </select>
                </div>
            <div>
                <label for="sector">Sector:</label>
                <input type="text" id="sector" th:field="*{sector}">
                </div>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" th:field="*{email}" required>
                </div>
            <div>
                <label for="celular">Celular:</label>
                <input type="text" id="celular" th:field="*{celular}">
                </div>
            <div>
                <label for="diaHoraInicio">Fecha y hora de inicio:</label>
                <input type="datetime-local" id="diaHoraInicio" th:field="*{diaHoraInicio}" required>
                </div>
            <div>
                <label for="diaHoraTermino">Fecha y hora de término:</label>
                <input type="datetime-local" id="diaHoraTermino" th:field="*{diaHoraTermino}">
                </div>
            <div>
                <label for="descripcion">Descripción:</label>
                <textarea id="descripcion" th:field="*{descripcion}"></textarea>
                </div>
            <div>
                <label for="fotos">Fotos:</label>
                <input type="file" id="fotos" th:field="*{fotos}" multiple>
                </div>
            <!-- Puedes agregar más campos según tu modelo -->
            <div>
                <button type="submit">Agregar</button>
                </div>
            </form>
    </div>
    <div th:replace="fragments/fragments :: footer"></div>
</body>
</html>
